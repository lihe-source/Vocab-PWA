name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 當你 push 到 main 分支時觸發。如果你是用 master，請改為 master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@v4

      # 如果你的網站需要編譯（例如 React/Vue），請在這邊加入 Build 步驟
      # 如果只是純 HTML，可以跳過編譯步驟

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # 要部署的資料夾。如果是 React 請改為 build，如果是 Vite 請改為 dist
          branch: gh-pages # 這是自動生成的部署分支，不要動它
